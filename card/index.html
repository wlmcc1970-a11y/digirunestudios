<style>
:root{
  --brass:#C4832A; --brass-dark:#7A5018; --brass-light:#E0A84E;
  --copper:#A06028; --iron:#2A1A0A; --iron-dark:#1C1008; --iron-deeper:#110804;
  --parchment:#F4EAD4; --parchment-dim:#C8A870; --steam:#E8D4B0;
  --glass-bg:rgba(28,16,8,0.55); --glass-border:rgba(224,168,78,0.22);
  --hud-glow:rgba(224,168,78,0.45); --shadow-deep:0 2px 4px rgba(0,0,0,0.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--brass-light);outline-offset:3px;border-radius:8px}
html,body{height:100%;overflow:hidden}
body{
  font-family:"IM Fell English",Georgia,serif;color:var(--parchment);position:relative;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(196,131,42,0.14), transparent 60%),
    radial-gradient(900px 500px at 50% 120%, rgba(160,96,40,0.12), transparent 60%),
    linear-gradient(160deg, #110804 0%, #1C1008 45%, #2A1A0A 100%);
}
.gearbg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.gearbg svg{position:absolute;opacity:0.05;color:var(--brass-light)}
.gearbg .g1{top:-70px;left:-70px;width:260px;height:260px;animation:spin 90s linear infinite}
.gearbg .g2{bottom:-90px;right:-80px;width:320px;height:320px;animation:spin 120s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}

.card{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transform-origin:center center;
  z-index:1;width:360px;max-width:calc(100vw - 20px);
  background:linear-gradient(180deg, rgba(42,26,10,0.72), rgba(17,8,4,0.82));
  border:1px solid var(--glass-border);border-radius:20px;
  box-shadow:0 22px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
  padding:20px 22px 16px;backdrop-filter:blur(6px);text-align:center;overflow:hidden;
}
.card::before{content:"";position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--hud-glow),transparent)}
.medallion{
  width:66px;height:66px;margin:0 auto 7px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%, #2A1A0A, #110804);
  border:1px solid rgba(224,168,78,0.35);
  box-shadow:0 0 0 5px rgba(196,131,42,0.08), 0 8px 20px rgba(0,0,0,0.5), inset 0 0 16px rgba(196,131,42,0.15);
  overflow:hidden;
}
.medallion img{width:100%;height:100%;object-fit:contain;display:block}
.medallion .fallback{display:none;width:40px;height:40px;color:var(--brass-light)}
.wordmark{font-family:"Cinzel",serif;font-weight:700;letter-spacing:0.26em;font-size:0.62rem;text-transform:uppercase;color:var(--brass-light);margin-bottom:5px;padding-left:0.26em}
.name{
  font-family:"Cinzel",serif;font-weight:900;letter-spacing:0.03em;font-size:1.5rem;line-height:1.05;color:var(--parchment);
  text-shadow:var(--shadow-deep);
  background:linear-gradient(180deg,#FBF3DF,#E9CF9C 70%,var(--brass));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.title{font-family:"Cinzel",serif;font-weight:500;letter-spacing:0.2em;font-size:0.64rem;text-transform:uppercase;color:var(--brass);margin-top:5px}
.tagline{font-style:italic;color:var(--parchment-dim);font-size:0.88rem;margin:7px auto 0;line-height:1.35}

.qrhero{margin-top:13px}
.qrcap{display:flex;align-items:center;justify-content:center;gap:9px;font-family:"Cinzel",serif;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;font-size:0.62rem;color:var(--brass-light);margin-bottom:9px}
.qrcap::before,.qrcap::after{content:"";height:1px;width:20px}
.qrcap::before{background:linear-gradient(90deg,transparent,var(--brass))}
.qrcap::after{background:linear-gradient(90deg,var(--brass),transparent)}
.qrframe{width:188px;margin:0 auto;padding:9px;border-radius:15px;background:rgba(244,234,212,0.04);border:1px solid var(--glass-border);box-shadow:0 0 20px rgba(224,168,78,0.13), inset 0 1px 0 rgba(255,255,255,0.05)}
.qr{width:100%;aspect-ratio:1/1;filter:drop-shadow(0 6px 14px rgba(0,0,0,0.4))}
.qr svg{width:100%;height:100%;display:block}
.qrsub{font-style:italic;color:var(--parchment-dim);font-size:0.72rem;margin-top:8px}
.qrurl{font-family:"Cinzel",serif;letter-spacing:0.06em;font-size:0.7rem;color:var(--brass);margin-top:2px}

.rule{height:1px;background:linear-gradient(90deg,transparent,var(--glass-border),transparent);margin:13px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 10px;
  text-decoration:none;cursor:pointer;border-radius:12px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--parchment);
  font-family:"Cinzel",serif;font-weight:500;letter-spacing:0.05em;font-size:0.72rem;text-transform:uppercase;
  transition:transform .12s ease, background .2s ease, border-color .2s ease;
}
.btn:hover{background:rgba(196,131,42,0.14);border-color:rgba(224,168,78,0.5)}
.btn:active{transform:translateY(2px)}
.btn svg{width:17px;height:17px;color:var(--brass-light);flex:none}
.btn.full{grid-column:1 / -1}
.social-row{grid-column:1 / -1;display:flex;gap:9px}
.sbtn{
  flex:1;display:flex;align-items:center;justify-content:center;min-height:44px;
  border-radius:12px;border:1px solid var(--glass-border);background:var(--glass-bg);color:var(--parchment);
  transition:transform .12s ease, background .2s ease, border-color .2s ease;
}
.sbtn:hover{background:rgba(196,131,42,0.14);border-color:rgba(224,168,78,0.5)}
.sbtn:active{transform:translateY(2px)}
.sbtn svg{width:20px;height:20px;color:var(--brass-light)}

.foot{margin-top:12px;color:var(--parchment-dim);font-size:0.64rem;line-height:1.5;letter-spacing:0.02em}
.foot .est{font-family:"Cinzel",serif;letter-spacing:0.12em;text-transform:uppercase;font-size:0.55rem;color:var(--parchment-dim)}

.toast{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 22px);transform:translate(-50%,150%);z-index:50;
  background:linear-gradient(180deg,#2A1A0A,#1C1008);border:1px solid var(--glass-border);color:var(--parchment);
  padding:12px 18px;border-radius:12px;font-size:0.88rem;box-shadow:0 10px 30px rgba(0,0,0,0.6);
  display:flex;align-items:center;gap:9px;transition:transform .35s cubic-bezier(.2,.9,.25,1.1);max-width:88vw;
}
.toast.show{transform:translate(-50%,0)}
.toast svg{width:18px;height:18px;color:var(--brass-light);flex:none}
@media (prefers-reduced-motion:reduce){.gearbg svg{animation:none}.toast{transition:none}}
</style>

<script>
(function(){
  "use strict";
  var CARD_URL="https://digirunestudios.com/card";
  var toastT;
  function toast(msg){
    var t=document.getElementById("toast");
    document.getElementById("toastMsg").textContent=msg;
    t.classList.add("show");
    clearTimeout(toastT);
    toastT=setTimeout(function(){t.classList.remove("show");},2600);
  }
  var shareEl=document.getElementById("shareBtn");
  if(shareEl){
    shareEl.addEventListener("click",async function(){
      var data={title:"Will McCullough — DigiRune Studios",text:"Will McCullough, CEO & Founder of DigiRune Studios",url:CARD_URL};
      if(navigator.share){ try{ await navigator.share(data); }catch(e){} }
      else if(navigator.clipboard){ try{ await navigator.clipboard.writeText(CARD_URL); toast("Card link copied"); }catch(e){ toast(CARD_URL); } }
      else { toast(CARD_URL); }
    });
  }
  // Scale-to-fit: keep the whole card on one screen, never upscale past natural size.
  var card=document.querySelector(".card");
  function fit(){
    if(!card) return;
    card.style.transform="translate(-50%,-50%) scale(1)";
    var w=card.offsetWidth, h=card.offsetHeight;
    if(!w||!h) return;
    var s=Math.min(1, (window.innerWidth-14)/w, (window.innerHeight-14)/h);
    card.style.transform="translate(-50%,-50%) scale("+s+")";
  }
  ["resize","orientationchange"].forEach(function(e){ window.addEventListener(e,fit); });
  window.addEventListener("load",fit);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fit); }
  fit();
})();
</script>
